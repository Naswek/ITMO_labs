tasks.register("diff") {
    group = "lab"

    def execOps = services.get(ExecOperations)

    doLast {
        println("${YELLOW}Проверяем изменения в рабочей копии...${RESET}")

        def changedFiles = new ByteArrayOutputStream()

        execOps.exec {
            commandLine("git", "diff", "--name-only")
            standardOutput = changedFiles
        }

        def changed = changedFiles.toString().trim()

        if (changed.isEmpty()) {
            println("${YELLOW}Изменений не найдено${RESET}")
        } else {
            println("${CYAN}Найдены изменения:${RESET}")
            println(changed)
        }

        println("${YELLOW}Добавляем файлы в индекс...${RESET}")

        execOps.exec {
            commandLine("git", "add", ".")
        }

        println("${YELLOW}Создаём коммит...${RESET}")

        execOps.exec {
            commandLine(
                    "git",
                    "commit",
                    "-m",
                    "Auto commit"
            )
            ignoreExitValue = true
        }

        println("${GREEN}Проверка состояния репозитория завершена${RESET}")
    }
}

tasks.register("alt") {
    dependsOn("myBuild")

    group = "lab"

    doLast {
        def altDir = file("$buildDir/alt")

        delete(altDir)

        copy {
            from(project.property("javaSourceDir"))
            into(altDir)
        }

        fileTree(altDir).matching {
            include("**/*.java")
        }.each { file ->

            def text = file.text

            text = text.replace(
                    "InputBean",
                    "InputBeanAlt"
            )

            text = text.replace(
                    "PointBean",
                    "PointBeanAlt"
            )

            file.text = text
        }

        println("Alternative version created")
    }
}


tasks.register("team") {
    group = "lab"

    def execOps = services.get(ExecOperations)

    doLast {
        def teamDir = file("$buildDir/team")
        teamDir.mkdirs()

        ["HEAD~1", "HEAD~2", "HEAD~3", "HEAD~4"].each { rev ->
            execOps.exec {
                commandLine("git", "checkout", rev)
                ignoreExitValue = true
            }

            execOps.exec {
                commandLine("gradle", "myBuild")
            }

            copy {
                from("$buildDir/libs")
                into(teamDir)
                include("*.jar")
                rename { "${rev.replace('~', '_')}.jar" }
            }
        }

        execOps.exec {
            commandLine(
                    "zip",
                    "-j",
                    "$teamDir/team-builds.zip",
                    *fileTree(teamDir).matching { include "*.jar" }.files*.absolutePath
            )
            ignoreExitValue = true
        }

        execOps.exec {
            commandLine("git", "checkout", "-")
            ignoreExitValue = true
        }
    }
}

import org.gradle.process.ExecOperations

tasks.register("history") {
    group = "lab"

    def execOps = services.get(ExecOperations)

    doLast {
        def historyDir = file("$buildDir/history")
        historyDir.mkdirs()

        println("Trying current revision...")

        def compileResult = execOps.exec {
            commandLine("gradle", "myCompile")
            ignoreExitValue = true
        }

        if (compileResult.exitValue == 0) {
            println("Current revision compiles successfully")
            return
        }

        println("Searching for working SVN revision...")

        while (true) {

            def svnResult = execOps.exec {
                commandLine("svn", "update", "-r", "PREV")
                ignoreExitValue = true
            }

            if (svnResult.exitValue != 0) {
                println("SVN history exhausted")
                break
            }

            compileResult = execOps.exec {
                commandLine("gradle", "myCompile")
                ignoreExitValue = true
            }

            if (compileResult.exitValue == 0) {

                println("Working revision found")

                def diffFile = file("$historyDir/history-diff.txt")

                diffFile.withOutputStream { os ->
                    execOps.exec {
                        commandLine("svn", "diff")
                        standardOutput = os
                    }
                }

                println("Diff saved to ${diffFile}")

                break
            }
        }
    }
}
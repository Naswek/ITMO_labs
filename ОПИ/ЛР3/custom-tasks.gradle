tasks.register("native2ascii") {
    group = "lab"

    doLast {
        def inputDir = file("src/main/resources")
        def outputDir = file("$buildDir/native2ascii")

        outputDir.mkdirs()

        def files = fileTree(inputDir).matching {
            include "**/*.properties"
        }.files

        if (files.isEmpty()) {
            println "No localization files found, skipping native2ascii"
            return
        }

        files.each { f ->
            def relativePath = inputDir.toPath().relativize(f.toPath()).toString()
            def outFile = file("$outputDir/$relativePath")

            outFile.parentFile.mkdirs()

            project.exec {
                commandLine(
                        "native2ascii",
                        "-encoding", "UTF-8",
                        f.absolutePath,
                        outFile.absolutePath
                )
            }
        }
    }
}





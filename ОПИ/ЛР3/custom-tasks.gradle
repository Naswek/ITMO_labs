tasks.register("xml") {

    def execOps = services.get(ExecOperations)

    doLast {
        def xmlFiles = fileTree(file(project.property("xmlSourceDir"))).matching {
            include("**/*.xml")
        }.files

        println("${CYAN}Найдено xml файлов: ${xmlFiles.size()}${RESET}")

        if (xmlFiles.isEmpty()) {
            println("${YELLOW}Xml файлы не найдены${RESET}")
            return

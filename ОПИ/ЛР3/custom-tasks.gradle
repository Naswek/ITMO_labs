tasks.register("report") {
    dependsOn("myTest")

    group = "lab"

    def execOps = services.get(ExecOperations)

    doLast {
        def reportDir = file("$buildDir/test-report")
        reportDir.mkdirs()

        execOps.exec {
            commandLine("git", "add", reportDir.absolutePath)
        }

        execOps.exec {
            commandLine("git", "commit", "-m", "Add junit report")
            ignoreExitValue = true
        }
    }
}


tasks.register("diff") {
    group = "lab"

    def execOps = services.get(ExecOperations)

    doLast {
        def changedFiles = new ByteArrayOutputStream()

        execOps.exec {
            commandLine("git", "diff", "--name-only")
            standardOutput = changedFiles
        }

        def changed = changedFiles.toString()


        execOps.exec {
            commandLine("git", "add", ".")
        }

        execOps.exec {
            commandLine(
                    "git",
                    "commit",
                    "-m",
                    "Auto commit"
            )
            ignoreExitValue = true
        }
    }
}

tasks.register("alt", Exec) {
    dependsOn("myBuild")

    commandLine(
            "sh",
            "-c",
            '''
            rm -rf build/alt
            mkdir -p build/alt

            cp -r src build/alt/

            find build/alt -name "*.java" \
                -exec sed -i 's/InputBean/InputBeanAlt/g' {} \\;

            echo "Alternative version created"
            '''
    )
}


tasks.register("team") {
    group = "lab"

    def execOps = services.get(ExecOperations)

    doLast {
        def teamDir = file("$buildDir/team")
        teamDir.mkdirs()

        ["HEAD~1", "HEAD~2", "HEAD~3", "HEAD~4"].each { rev ->
            execOps.exec {
                commandLine("git", "checkout", rev)
                ignoreExitValue = true
            }

            execOps.exec {
                commandLine("gradle", "myBuild")
            }

            copy {
                from("$buildDir/libs")
                into(teamDir)
                include("*.jar")
                rename { "${rev.replace('~', '_')}.jar" }
            }
        }

        execOps.exec {
            commandLine(
                    "zip",
                    "-j",
                    "$teamDir/team-builds.zip",
                    *fileTree(teamDir).matching { include "*.jar" }.files*.absolutePath
            )
            ignoreExitValue = true
        }

        execOps.exec {
            commandLine("git", "checkout", "-")
            ignoreExitValue = true
        }
    }
}

tasks.register("history") {
    doLast {
        def historyDir = file("$buildDir/history")
        historyDir.mkdirs()

        println("Trying current revision...")

        def result = exec {
            commandLine("gradle", "myCompile")
            ignoreExitValue = true
        }

        if (result.exitValue == 0) {
            println("Current revision compiles")
            return
        }

        println("Searching working SVN revision...")

        while (true) {
            exec {
                commandLine("svn", "update", "-r", "PREV")
                ignoreExitValue = true
            }

            result = exec {
                commandLine("gradle", "myCompile")
                ignoreExitValue = true
            }

            if (result.exitValue == 0) {
                println("Working revision found")

                project.exec {
                    commandLine(
                            "svn",
                            "diff"
                    )

                    standardOutput =
                            new FileOutputStream(
                                    file("$historyDir/history-diff.txt")
                            )
                }

                break
            }
        }
    }
}
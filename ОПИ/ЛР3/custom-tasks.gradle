tasks.register("myCompile", Exec) {
    def srcDir = file(project.property("javaSourceDir"))
    def outDir = file("$buildDir/custom/classes/main")

    doFirst {
        outDir.mkdirs()

        def javaFiles = fileTree(srcDir).matching {
            include "**/*.java"
        }.files*.path

        if (javaFiles.isEmpty()) {
            throw new GradleException("No Java files found in: $srcDir")
        }

        commandLine([
                project.property("javaCompilerPath"),
                "-encoding", "UTF-8",
                "-cp", sourceSets.main.compileClasspath.asPath,
                "-d", outDir.absolutePath,
                *javaFiles
        ])
    }
}

tasks.register("myBuild", Jar) {
    dependsOn("myCompile")

    archiveFileName = project.property("jarName")

    from("$buildDir/classes/java/main")

    manifest {
        attributes(
                "Main-Class": project.property("mainClassName")
        )
    }
}


tasks.register("myClean", Delete) {
    delete buildDir
}


tasks.register("myTest") {                  //НЕ ВОРККККК
    dependsOn "myBuild", "testClasses"
    
    doLast {
        project.exec {
            commandLine(
                    project.property("javaRuntimePath"),
                    "-cp", sourceSets.test.runtimeClasspath.asPath,
                    "org.junit.platform.console.ConsoleLauncher",
                    "execute",
                    "--scan-classpath",
                    "--details", "tree"
            )
        }
    }
}


tasks.register("music", Exec) {
    dependsOn("myBuild")

    commandLine "sh", "-c", "paplay /usr/share/sounds/freedesktop/stereo/complete.oga || true"
}


tasks.register("xml", Exec) {
    group = "lab"

    commandLine(
            "sh",
            "-c",
            "find . -name '*.xml' -exec xmllint --noout {} \\;"
    )
}


tasks.register("env", Exec) {       //НЕ ВООООООООООООООООООРК
    dependsOn("myBuild")

    commandLine(
        project.property("javaRuntimePath"),
        "-jar",
        "$buildDir/libs/${project.property('jarName')}"
    )
}

tasks.register("native2ascii") { //НЕ ВОООООООООООООООООООООРК
    group = "lab"

    doLast {
        def outDir = file("$buildDir/native2ascii")
        outDir.mkdirs()

        fileTree("src/main/resources").matching {
            include "**/*.properties"
        }.files.each { f ->
            project.exec {
                commandLine(
                        "native2ascii",
                        f.absolutePath,
                        "${outDir}/${f.name}"
                )
            }
        }
    }
}




tasks.register("doc", Exec) {
    dependsOn("myBuild")

    commandLine(
            "javadoc",
            "-encoding", "UTF-8",
            "-classpath", sourceSets.main.compileClasspath.asPath,
            "-d", "$buildDir/docs/javadoc",
            *fileTree(project.property("javaSourceDir"))
                    .matching { include "**/*.java" }
                    .files*.path
    )
}


tasks.register("scp", Exec) {
    dependsOn("myBuild")

    commandLine(
            "scp",
            "$buildDir/libs/${project.property('jarName')}",
            project.property("scpTarget")
    )

    ignoreExitValue = true
}
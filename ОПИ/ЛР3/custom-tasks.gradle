tasks.register("native2ascii") {

    doLast {
        println("${YELLOW}Ищем файлы локализации...${RESET}")
    
        def inputDir = file("src/main/resources")
        def outputDir = file("$buildDir/native2ascii")
    
        outputDir.mkdirs()
    
        def files = fileTree(inputDir).matching {
            include "**/*.properties"
        }.files
    
        println("${CYAN}Найдено файлов локализации: ${files.size()}${RESET}")
    
        if (files.isEmpty()) {
            println("${YELLOW}Файлы локализации не найдены${RESET}")
            return
        }
    
        files.each { f ->
            println("${YELLOW}Обрабатываем: ${f.name}${RESET}")
    
            def relativePath = inputDir.toPath().relativize(f.toPath()).toString()
            def outFile = file("$outputDir/$relativePath")
    
            outFile.parentFile.mkdirs()
    
            project.exec {
                commandLine(
                        "native2ascii",
                        "-encoding", "UTF-8",
                        f.absolutePath,
                        outFile.absolutePath
                )
            }
        }
    
        println("${GREEN}Преобразование native2ascii завершено!")
        println("Результат сохранён в: ${outputDir.absolutePath}${RESET}")
    }
}


















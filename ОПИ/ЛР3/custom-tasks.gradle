def GREEN = "\u001B[32m"
def CYAN = "\u001B[36m"
def YELLOW = "\u001B[33m"
def RESET = "\u001B[0m"


tasks.register("myCompile", Exec) {
    def srcDir = file(project.property("javaSourceDir"))
    def outDir = file("$buildDir/custom/classes/main")

    doFirst {
        outDir.mkdirs()

        println "${CYAN}Поиск Java-файлов...${RESET}"
        def javaFiles = fileTree(srcDir).matching {
            include "**/*.java"
        }.files*.path

        println "${CYAN}Найдено ${javaFiles.size()} файлов${RESET}"

        commandLine([
                project.property("javaCompilerPath"),
                "-encoding", "UTF-8",
                "-cp", sourceSets.main.compileClasspath.asPath,
                "-d", outDir.absolutePath,
                *javaFiles
        ])
        println "${CYAN}Компилируем...${RESET}"
    }
    doLast {
        println("${GREEN}Все файлы скомпилировались!${RESET}")
    }
}

tasks.register("myBuild", Jar) {
    dependsOn("myCompile")

    doFirst {
        println("${CYAN}Создание JAR-архива...${RESET}")
    }
    
    archiveFileName = project.property("jarName")

    from("$buildDir/classes/java/main")

    manifest {
        attributes(
                "Main-Class": project.property("mainClassName")
        )
    }

    doLast {
        println("${GREEN}Jar успешно создан${RESET}")
        println("${CYAN}Файл: ${archiveFile.get().asFile}${RESET}")
        println("${CYAN}Размер: ${(archiveFile.get().asFile.length() / 1024.0).round(2)} КБ${RESET}")
    }
}


tasks.register("myClean", Delete) {
    println("${CYAN}Очищаем директорию build...${RESET}")
    delete buildDir

    doLast {
        println("${GREEN}Директория build успешно удалена!${RESET}")
    }
}


tasks.register("myCompileTest", Exec) {
    dependsOn("myCompile")

    def testSrcDir = file(project.property("testSourceDir"))
    def testOutDir = file("$buildDir/custom/classes/test")

    onlyIf {
        testSrcDir.exists() &&
                !fileTree(testSrcDir).matching { include "**/*.java" }.files.isEmpty()
    }

    doFirst {
        println("${YELLOW}Ищем файлы тестов...${RESET}")

        testOutDir.mkdirs()

        def testFiles = fileTree(testSrcDir)
                .matching { include "**/*.java" }
                .files*.absolutePath

        println("${CYAN}Найдено тестов: ${testFiles.size()}${RESET}")
        println("${CYAN}Компилируем тесты...${RESET}")

        commandLine(
                project.property("javaCompilerPath"),
                "-encoding", "UTF-8",
                "-cp",
                sourceSets.test.runtimeClasspath.asPath
                        + File.pathSeparator + "$buildDir/custom/classes/main",
                "-d",
                testOutDir.absolutePath,
                *testFiles
        )
    }

    doLast {
        println("${GREEN}Тесты успешно скомпилированы!${RESET}")
    }
}

tasks.register("myTest") {
    dependsOn("myBuild", "myCompileTest")

    def execOps = services.get(ExecOperations)

    doLast {
        def testOutDir = file("$buildDir/custom/classes/test")

        if (!testOutDir.exists() ||
                fileTree(testOutDir).matching { include "**/*.class" }.files.isEmpty()) {
            println("${YELLOW}Тесты не найдены, запуск JUnit пропущен${RESET}")
            return
        }

        println("${CYAN}Запускаем JUnit-тесты...${RESET}")

        execOps.exec {
            commandLine(
                    project.property("javaRuntimePath"),
                    "-cp",
                    sourceSets.test.runtimeClasspath.asPath
                            + File.pathSeparator + "$buildDir/custom/classes/main"
                            + File.pathSeparator + testOutDir.absolutePath,
                    "org.junit.platform.console.ConsoleLauncher",
                    "execute",
                    "--scan-classpath",
                    testOutDir.absolutePath,
                    "--details",
                    "tree"
            )
        }

        println("${GREEN}JUnit тесты успешно пройдены!${RESET}")
    }
}


